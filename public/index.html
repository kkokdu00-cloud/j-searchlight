<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>의약품 제품 검색</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon" onclick="location.reload()" style="cursor:pointer;">藥</div>
      <h1>의약품 검색 시스템</h1>
      <p>HIRA 약가 정보 조회</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-title">메뉴</div>
      <a href="/index.html" class="active">
        <span class="nav-icon">🔍</span> 제품 검색
      </a>
      <a href="/upload.html">
        <span class="nav-icon">📥</span> 수수료 관리
      </a>
    </div>
    <div class="sidebar-footer">
      © 2026 Pharma Drug Search
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h2>의약품 제품 검색</h2>
      <span class="breadcrumb">홈 &rsaquo; 제품 검색</span>
    </div>

    <div class="page-body">

      <!-- Search Card -->
      <div class="search-card">
        <div class="search-type-group">
          <label>
            <input type="radio" name="searchType" value="company" checked />
            제약사명
          </label>
          <label>
            <input type="radio" name="searchType" value="code" />
            제품코드
          </label>
          <label>
            <input type="radio" name="searchType" value="name" />
            제품명·성분명
          </label>
        </div>
        <div class="search-input-row">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="검색어를 입력하세요.."
            autocomplete="off"
          />
          <button class="btn btn-primary" onclick="searchDrugs()">
            🔍 검색
          </button>
        </div>
        <div class="search-filter-row">
          <label class="filter-checkbox-label">
            <input type="checkbox" id="bioFilter" onchange="applyFilters()" />
            <span class="badge badge-bio">생동성</span> 인정품목만 보기
          </label>
          <label class="filter-checkbox-label" style="margin-left:16px;">
            <input type="checkbox" id="priceFilter" onchange="applyFilters()" />
            <span class="badge badge-price-ok">약가유지</span> 품목만 보기
            <span style="font-size:11px; color:#888; margin-left:4px;">(자체생동+DMF 충족)</span>
          </label>
          <label class="filter-checkbox-label" style="margin-left:16px;">
            <input type="checkbox" id="commissionFilter" onchange="applyFilters()" checked />
            수수료 등록 품목만 보기
          </label>
        </div>
        <div id="searchAlert" style="margin-top:12px;display:none;"></div>
      </div>

      <!-- Results Section -->
      <div id="resultsSection" style="display:none;">
        <div class="results-header">
          <div class="results-count">
            검색결과 <strong id="resultCount">0</strong>건
          </div>
          <button class="btn btn-success btn-sm" onclick="downloadExcel(currentData, '의약품 검색결과')">
            📥 엑셀 다운로드
          </button>
        </div>

        <div class="table-wrapper">
          <table id="resultsTable">
            <thead>
              <tr>
                <th style="width:46px;">번호</th>
                <th>제약사</th>
                <th>제품명</th>
                <th>성분명</th>
                <th>보험가(원)</th>
                <th>수수료율(%)</th>
                <th>수수료환산(원)</th>
                <th>제품코드</th>
                <th>표준코드</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
            </tbody>
          </table>
        </div>
      </div>

      <!-- Empty / Initial state -->
      <div id="emptyState" class="card">
        <div class="empty-state">
          <div class="empty-icon">藥</div>
          <p>검색어를 입력하고 검색 버튼을 눌러주세요</p>
          <p style="margin-top:6px; font-size:12px; color:#adb5bd;">제약사명, 제품코드, 제품명으로 검색하실 수 있습니다.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">데이터를 불러오는 중..</div>
  </div>

  <!-- Ingredient Popup Modal -->
  <div class="modal-overlay" id="ingredientModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">동일성분 제약사 목록</h3>
        <div class="modal-actions">
          <button class="btn btn-success btn-sm" onclick="downloadModalExcel()">
            📥 엑셀 다운로드
          </button>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div id="diseaseCodesSection" style="display:none;"></div>
      <div class="modal-body">
        <div id="modalAlert" style="display:none;"></div>
        <div id="modalContent">
          <div class="table-wrapper">
            <table id="modalTable">
              <thead>
                <tr>
                  <th style="width:46px;">번호</th>
                  <th>제약사</th>
                  <th>제품명</th>
                  <th>보험가(원)</th>
                  <th>수수료율(%)</th>
                  <th>수수료환산(원)</th>
                  <th>제품코드</th>
                  <th>표준코드</th>
                  <th>비고</th>
                </tr>
              </thead>
              <tbody id="modalBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SheetJS CDN -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="/js/popup.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
